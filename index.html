<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed GT Gatannesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cinzel:wght@400;500;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:        #1a1410;
    --parchment:  #f5f0e8;
    --sepia:      #c8a96e;
    --rust:       #8b4a2b;
    --gold:       #d4a843;
    --shadow:     #0d0b08;
    --mist:       rgba(200, 169, 110, 0.12);
    --vignette:   rgba(13, 11, 8, 0.72);
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    background: var(--ink);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    position: relative;
  }

  /* ── Animated starfield / dust ── */
  .cosmos {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .cosmos::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 140% 80% at 50% 0%, #1e140a 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 80% 100%, #120c06 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 10% 80%, #0a0806 0%, transparent 40%);
    background-color: #0d0b08;
  }

  /* Grain texture overlay */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, var(--vignette) 100%);
  }

  /* Floating dust particles */
  @keyframes drift {
    0%   { transform: translateY(0px) translateX(0px); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-120px) translateX(30px); opacity: 0; }
  }
  .dust {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .dust span {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--gold);
    animation: drift linear infinite;
    opacity: 0;
  }

  /* Ornamental rule lines */
  .rule {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
  }
  .rule::before, .rule::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: linear-gradient(to right, transparent, var(--sepia), transparent);
  }
  .rule-glyph {
    color: var(--sepia);
    font-size: 14px;
    opacity: 0.7;
    letter-spacing: 4px;
    font-family: 'Cinzel', serif;
  }

  /* ── Main layout ── */
  .site {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }

  /* Glowing halo behind name */
  .halo {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 168, 67, 0.06) 0%, transparent 70%);
    pointer-events: none;
    animation: halo-pulse 6s ease-in-out infinite;
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.08); }
  }

  /* Eyebrow label */
  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--sepia);
    opacity: 0;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: fade-up 1.2s ease forwards 0.4s;
  }

  /* Name */
  .name-block {
    margin-bottom: 36px;
    opacity: 0;
    animation: fade-up 1.4s ease forwards 0.8s;
  }
  .name-first {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: clamp(32px, 6vw, 62px);
    font-weight: 400;
    color: var(--parchment);
    letter-spacing: 0.12em;
    line-height: 1.1;
  }
  .name-last {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 3vw, 32px);
    font-weight: 400;
    color: var(--sepia);
    letter-spacing: 0.3em;
    margin-top: 6px;
  }
  .name-initial {
    color: var(--gold);
    text-shadow: 0 0 30px rgba(212, 168, 67, 0.4);
  }

  /* Ornament */
  .ornament-block {
    opacity: 0;
    animation: fade-up 1s ease forwards 1.3s;
    margin-bottom: 36px;
  }

  /* Divider glyph */
  .divider-glyph {
    font-size: 20px;
    color: var(--gold);
    opacity: 0.6;
    line-height: 1;
  }

  /* Motto */
  .motto-block {
    opacity: 0;
    animation: fade-up 1.2s ease forwards 1.7s;
    margin-bottom: 48px;
    max-width: 420px;
  }
  .motto-latin {
    font-family: 'IM Fell English', Georgia, serif;
    font-style: italic;
    font-size: clamp(20px, 3.5vw, 28px);
    color: var(--parchment);
    letter-spacing: 0.04em;
    line-height: 1.4;
    text-shadow: 0 0 40px rgba(245, 240, 232, 0.15);
  }
  .motto-accent {
    color: var(--gold);
  }
  .motto-translation {
    margin-top: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-style: normal;
    letter-spacing: 0.2em;
    color: var(--sepia);
    opacity: 0.75;
    text-transform: uppercase;
  }

  /* Bottom rule */
  .bottom-rule {
    opacity: 0;
    animation: fade-up 1s ease forwards 2.1s;
    width: 100%;
    max-width: 480px;
    margin-bottom: 40px;
  }

  /* Scroll cue */
  .scroll-cue {
    opacity: 0;
    animation: fade-up 1s ease forwards 2.6s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--sepia);
  }
  .scroll-cue span {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.5;
  }
  @keyframes scroll-bob {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50%       { transform: translateY(6px); opacity: 0.9; }
  }
  .scroll-arrow {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--sepia), transparent);
    animation: scroll-bob 2s ease-in-out infinite;
    opacity: 0.5;
  }

  /* ── Second section ── */
  .second {
    position: relative;
    z-index: 10;
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px 100px;
    text-align: center;
  }
  .seal {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 0.5px solid var(--sepia);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 40px;
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--sepia);
    letter-spacing: 0.1em;
    opacity: 0;
    position: relative;
    animation: fade-in 1.4s ease forwards;
    animation-play-state: paused;
  }
  .seal::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 0.5px solid rgba(212, 168, 67, 0.2);
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 3vw, 26px);
    font-style: italic;
    font-weight: 300;
    color: rgba(245, 240, 232, 0.65);
    line-height: 1.8;
    max-width: 600px;
    opacity: 0;
    animation: fade-in 1.4s ease forwards;
    animation-play-state: paused;
  }
  .tagline em {
    color: var(--parchment);
    font-style: normal;
  }

  /* ── Animations ── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-delay: 0ms !important; }
  }

  /* Stars in canvas */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="grain"></div>
<div class="vignette"></div>
<div class="dust" id="dust"></div>

<!-- Hero section -->
<main class="site" role="main">
  <div class="halo"></div>

  <p class="eyebrow" aria-label="Personal introduction">Est. — an unfinished story</p>

  <div class="name-block">
    <span class="name-first">
      <span class="name-initial">M</span>ohamed
      <span class="name-initial"> G</span>T
    </span>
    <span class="name-last">Gatannesh</span>
  </div>

  <div class="ornament-block" aria-hidden="true">
    <div class="rule">
      <span class="rule-glyph">✦</span>
    </div>
  </div>

  <div class="motto-block">
    <p class="motto-latin">
      <span class="motto-accent">Per aspera</span> ad astra
    </p>
    <p class="motto-translation">Through hardship to the stars</p>
  </div>

  <div class="bottom-rule" aria-hidden="true">
    <div class="rule">
      <span class="rule-glyph">◆</span>
    </div>
  </div>

  <div class="scroll-cue" aria-hidden="true">
    <span>Descend</span>
    <div class="scroll-arrow"></div>
  </div>
</main>

<!-- Second section -->
<section class="second" aria-label="Introductory section">
  <div class="seal" aria-hidden="true">MG</div>
  <p class="tagline">
    Some are defined by where they came from.<br>
    Others by <em>where they refuse to stop</em>.
  </p>
</section>

<script>
// ── Starfield canvas ──
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = document.body.scrollHeight;
  }

  function createStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) {
      const size = Math.random() * 1.4 + 0.2;
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: size,
        a: Math.random() * 0.8 + 0.1,
        twinkle: Math.random() * Math.PI * 2,
        speed:   Math.random() * 0.02 + 0.005,
        gold: Math.random() > 0.88
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.twinkle += s.speed;
      const alpha = s.a * (0.6 + 0.4 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.gold
        ? `rgba(212, 168, 67, ${alpha})`
        : `rgba(245, 240, 232, ${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }

  resize();
  createStars(320);
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', () => { resize(); createStars(320); });
})();

// ── Dust particles ──
(function() {
  const container = document.getElementById('dust');
  const N = 18;
  for (let i = 0; i < N; i++) {
    const s = document.createElement('span');
    const x = Math.random() * 100;
    const y = 30 + Math.random() * 60;
    const dur = 8 + Math.random() * 12;
    const delay = Math.random() * 10;
    const size = Math.random() > 0.5 ? '1px' : '2px';
    s.style.cssText = `left:${x}%;top:${y}%;animation-duration:${dur}s;animation-delay:${delay}s;width:${size};height:${size}`;
    container.appendChild(s);
  }
})();

// ── Scroll-triggered reveal for second section ──
(function() {
  const targets = document.querySelectorAll('.seal, .tagline');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.animationPlayState = 'running';
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.3 });
  targets.forEach((el, i) => {
    el.style.animationDelay = (i * 0.3 + 0.2) + 's';
    observer.observe(el);
  });
})();
</script>
</body>
</html>
